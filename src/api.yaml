openapi: 3.0.3
info:
  title: Shopping Cart API
  version: 1.0.0
  description: Shopping cart API backed by interchangeable memory, MySQL, or DynamoDB stores.

paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is healthy

  /shopping-carts:
    post:
      summary: Create a new shopping cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCartRequest'
      responses:
        '201':
          description: Shopping cart created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /shopping-carts/{shoppingCartId}:
    get:
      summary: Retrieve a shopping cart by ID
      parameters:
        - name: shoppingCartId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '200':
          description: Shopping cart found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '400':
          description: Invalid shopping cart ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Shopping cart not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /shopping-carts/{shoppingCartId}/items:
    post:
      summary: Add or update an item in an existing shopping cart
      parameters:
        - name: shoppingCartId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddItemRequest'
      responses:
        '204':
          description: Item added or updated
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Shopping cart not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    CreateCartRequest:
      type: object
      required:
        - customer_id
      properties:
        customer_id:
          type: integer
          format: int64
          minimum: 1

    AddItemRequest:
      type: object
      required:
        - product_id
        - quantity
      properties:
        product_id:
          type: integer
          format: int64
          minimum: 1
        quantity:
          type: integer
          format: int64
          minimum: 1

    Cart:
      type: object
      required:
        - shopping_cart_id
        - customer_id
        - items
        - created_at
        - updated_at
      properties:
        shopping_cart_id:
          type: integer
          format: int64
        customer_id:
          type: integer
          format: int64
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CartItem:
      type: object
      required:
        - product_id
        - quantity
      properties:
        product_id:
          type: integer
          format: int64
        quantity:
          type: integer
          format: int64

    Error:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: string
